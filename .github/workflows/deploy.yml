name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version extracted: $VERSION"

      - name: Update package.json
        run: |
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            TARGET_VERSION="${{ steps.version.outputs.VERSION }}"
            if [ "$CURRENT_VERSION" = "$TARGET_VERSION" ]; then
              echo "package.json already at $TARGET_VERSION; skipping version update"
            else
              npm version "$TARGET_VERSION" --no-git-tag-version
            fi

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        continue-on-error: true
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Deploy to just-ero.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_REPO_TOKEN }}
          external_repository: just-ero/just-ero.github.io
          publish_branch: main
          publish_dir: ./dist
          destination_dir: wasmux
